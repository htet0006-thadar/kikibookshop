<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiki's Bookshop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">LOGO</div>
    <div class="search-bar">
      <input type="text" placeholder="Search..." />
      <button class="filter-btn">Filter</button>
    </div>
    <div class="header-icons">
      <button class="icon-wishlist" aria-label="Wishlist">&#9825;</button>
      <button class="icon-cart" aria-label="Cart">Cart</button>
      <button class="icon-account" aria-label="Account">Account</button>
    </div>
  </header>

  <nav class="genre-nav">
    <ul>
      <li><a href="#">Memoir</a></li>
      <li><a href="#">Sci-Fi</a></li>
      <li><a href="#">Romance</a></li>
      <li><a href="#">Thriller</a></li>
      <li><a href="#">Young Adult</a></li>
      <li><a href="#">Non-Fiction</a></li>
      <li><a href="#">Classics</a></li>
    </ul>
  </nav>

  <main>

    <section class="hero-banner">
      <img src="" alt="Featured banner" />
    </section>

    <section class="book-section" id="best-sellers">
      <div class="section-header">
        <h2>Best Sellers</h2>
        <a href="#">View More</a>
      </div>
      <div class="book-grid">
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
      </div>
    </section>

    <section class="book-section" id="new-arrivals">
      <div class="section-header">
        <h2>New Arrivals</h2>
        <a href="#">View More</a>
      </div>
      <div class="book-grid">
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
      </div>
    </section>

    <section class="book-section" id="most-popular">
      <div class="section-header">
        <h2>Most Popular</h2>
        <a href="#">View More</a>
      </div>
      <div class="book-grid">
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
        <div class="book-card"><img src="" alt="Book cover" /></div>
      </div>
    </section>

  </main>

  <footer>
    <div class="footer-links">
      <div class="footer-col">
        <ul>
          <li><a href="#">Link</a></li>
          <li><a href="#">Link</a></li>
          <li><a href="#">Link</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <ul>
          <li><a href="#">Link</a></li>
          <li><a href="#">Link</a></li>
          <li><a href="#">Link</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-social">
      <a href="#" aria-label="Instagram">Instagram</a>
      <a href="#" aria-label="LinkedIn">LinkedIn</a>
      <a href="#" aria-label="Facebook">Facebook</a>
    </div>
  </footer>

</body>
</html>
