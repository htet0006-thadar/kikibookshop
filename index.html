<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiki's Bookshop</title>
  <link rel="stylesheet" href="normalize.css" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>

  <header>
    <div class="logo"><a href="index.html">Kiki's</a></div>
    <div class="search-bar">
      <input type="text" placeholder="Search..." />
      <button class="filter-btn">Filter</button>
    </div>
    <nav class="header-icons">
      <button class="icon-wishlist" onclick="window.location.href='#'" aria-label="Wishlist">&#9825;</button>
      <button class="icon-shopping-cart" onclick="window.location.href='cart.html'" aria-label="Cart">Cart</button>
      <button class="icon-account" onclick="window.location.href='#'" aria-label="Account">Account</button>
      <button class="icon-about" onclick="window.location.href='about.html'">About</button>
      </nav>
  </header>

  <nav class="genre-nav">
    <ul>
      <li><a href="#">Memoir</a></li>
      <li><a href="#">Sci-Fi</a></li>
      <li><a href="#">Romance</a></li>
      <li><a href="#">Thriller</a></li>
      <li><a href="#">Young Adult</a></li>
      <li><a href="#">Non-Fiction</a></li>
      <li><a href="#">Classics</a></li>
    </ul>
  </nav>

  <main>
  <section class="hero-banner">
    <img src="images/hero1.jpg" alt="Featured banner" />
  </section>

  <!-- Best Sellers -->
  <section class="book-section" id="best-sellers">
    <div class="section-header">
      <h2>Best Sellers</h2>
      <a href="#">View More</a>
    </div>
    <div class="book-grid">
      <div class="book-card">
        <img src="images/memoir1.png" alt="Book cover" />
        <a href="bookdetails.html"><p class="book-name">Crying in H Mart</p></a>
      </div>
      <div class="book-card">
        <img src="images/memoir2.png" alt="Book cover" />
        <a href="bookdetails.html"><p class="book-name">Educated</p></a>
      </div>
      <div class="book-card">
        <img src="images/normalpeople.png" alt="Book cover" />
        <a href="bookdetails.html"><p class="book-name">Normal People</p></a>
      </div>
      <div class="book-card">
        <img src="images/dune.jpg" alt="Book cover" />
        <a href="bookdetails.html"><p class="book-name">Dune</p></a>
      </div>
      <div class="book-card">
        <img src="images/harrypotter.jpg" alt="Book cover" />
        <a href="bookdetails.html"><p class="book-name">Harry Potter</p></a>
      </div>
    </div>
  </section>

</main>

  <footer>
    <div class="footer-links">
      <div class="footer-col">
        <ul>
          <li><a href="#">Contact Us</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Work with Us</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-social">
      <a href="#" aria-label="Instagram">Instagram</a>
      <a href="#" aria-label="LinkedIn">LinkedIn</a>
      <a href="#" aria-label="Facebook">Facebook</a>
    </div>
  </footer>


</body>
</html>
